<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SEA - IFAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <!-- Navbar -->
    <div
      class="bg-green-800 text-white p-4 flex justify-between absolute top-0 left-0 w-full"
    >
      <h1 class="font-bold">SEA - IFAL</h1>
    </div>
    {% if modo == "login"%}
    <div class="m-5 max-w-sm mt-20 mx-auto bg-white shadow-xl rounded-2xl p-8 w-full">
      <!-- Título -->
      <h1 class="text-2xl font-bold text-gray-800 text-center mb-6">
        Acessar Conta
      </h1>

      <form action="/login" method="post" class="space-y-4">
        <!-- Username -->
        <div>
          <label for="username" class="block text-sm font-medium text-gray-700">
            Usuário
          </label>
          <input
            type="text"
            id="username"
            name="username"
            required
            class="mt-1 w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-600"
          />
        </div>

        <!-- Password -->
        <div class="">
          <label for="password" class="block text-sm font-medium text-gray-700">
            Senha
          </label>
          <input
            type="password"
            id="password"
            name="password"
            required
            class="mt-1 w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-600"
          />
        </div>

        <!-- Botão -->
        <button
          type="submit"
          class="w-full bg-green-700 hover:bg-green-600 text-white font-semibold py-2 rounded-lg transition duration-200"
        >
          Entrar
        </button>
      </form>
      <p class="text-sm text-gray-500 text-center mt-6">
        Não tem conta?
        <a href="/cadastro" class="text-green-700 hover:underline">
          Cadastrar
        </a>
      </p>
    </div>
    {% elif modo == "cadastro" %}
    <div class="m-5 max-w-sm mt-20 mx-auto bg-white shadow-xl rounded-2xl p-8 w-full">
      <!-- Título -->
      <h1 class="text-2xl font-bold text-gray-800 text-center mb-6">
        Criar Conta
      </h1>

      <form action="/register" method="post" class="space-y-4">
        <!-- Nome -->
        <div>
          <label for="name" class="block text-sm font-medium text-gray-700">
            Nome
          </label>
          <input
            type="text"
            id="name"
            name="name"
            required
            class="mt-1 w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-600"
          />
        </div>

        <!-- Usuário -->
        <div>
          <label for="username" class="block text-sm font-medium text-gray-700">
            Usuário
          </label>
          <input
            type="text"
            id="username"
            name="username"
            required
            class="mt-1 w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-600"
          />
        </div>


        <!-- Curso-->
        <div>
          <label for="curso" class="block text-sm font-medium text-gray-700">
            Curso
          </label>
          <select
            name="curso"
            id="curso"
            required
            class="mt-1 w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-600"
          >
            <option value="">Selecione o curso</option>
            <option value="PF">Professor</option>
            <option value="Desenvolvimento de Sistema">Desenvolvimento de Sistema</option>
            <option value="Meio Ambiente">Meio Ambiente</option>
            <option value="Guia de Turismo">Guia de Turismo</option>
            <option value="Instrumento Musical">Instrumento Musical</option>
            <option value="Hospedagem">Hospedagem</option>
          </select>
        </div>

        <!-- Série -->
        <div id="div_serie">
          <label for="serie" class="block text-sm font-medium text-gray-700">
            Série
          </label>
          <select
            name="serie"
            id="serie"
            required
            class="mt-1 w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-600"
          >
            <option value="">Selecione a série</option>
            <option value="1">1º</option>
            <option value="2">2º</option>
            <option value="3">3º</option>
          </select>
        </div>

        <!-- Turma -->
        <div id="div_turma">
          <label for="turma" class="block text-sm font-medium text-gray-700">
            Turma
          </label>
          <select
            name="turma"
            id="turma"
            required
            class="mt-1 w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-600"
          >
            <option value="">Selecione a turma</option>
            <option value="A">A</option>
            <option value="B">B</option>
          </select>
        </div>

         <!-- Matricula -->
        <div id="div_matricula">
          <label
            for="matricula"
            class="block text-sm font-medium text-gray-700"
          >
            Matrícula
          </label>
          <input
            type="number"
            id="matricula"
            name="matricula"
            required
            class="mt-1 w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-600"
          />
        </div>

        <!-- Senha -->
        <div>
          <label for="password" class="block text-sm font-medium text-gray-700">
            Senha
          </label>
          <input
            type="password"
            id="password"
            name="password"
            required
            class="mt-1 w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-600"
          />
        </div>


        <!-- Rodapé -->
        <p class="text-sm text-gray-500 text-center mt-6">
          Já tem conta?
          <a href="/" class="text-green-700 hover:underline"> Entrar </a>
        </p>

        <!-- Botão -->
        <button
          type="submit"
          class="w-full bg-green-700 hover:bg-green-600 text-white font-semibold py-2 rounded-lg transition duration-200"
        >
          Cadastrar
        </button>
      </form>
    </div>
    {% endif %}
  </body>
</html>
